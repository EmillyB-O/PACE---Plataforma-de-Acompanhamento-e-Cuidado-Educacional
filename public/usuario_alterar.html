<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../src/assets/css/style.css">
    <style>
        body {
            background-image: url(../src/assets/img/fundo3.png);
            background-size: cover;
        }
    </style>
    <title>Alterar Usuário - PACE</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: #004e7a;" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PACE</a>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 card p-4 shadow">
                <h3 class="text-center mb-4">Alterar Usuário</h5>
                <input type="hidden" id="id">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome">
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf">
                    </div>
                    <div class="col-md-6">
                        <label for="senha" class="form-label">Nova Senha (deixar em branco p/ manter)</label>
                        <input type="password" class="form-control" id="senha">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="text" class="form-control" id="telefone">
                    </div>
                    <div class="col-md-6">
                        <label for="cargo" class="form-label">Cargo (Tipo de Usuário)</label>
                        <select class="form-select" id="cargo">
                            <option value="">Selecione...</option>
                            <option value="1">Administrador</option>
                            <option value="2">Pedagogo</option>
                            <option value="3">Profissional da Saúde</option>
                            <option value="4">Professor</option>
                            <option value="5">Responsável Legal</option>
                        </select>
                    </div>
                </div>

                <!-- Divs Especializadas -->
                <div id="div_admin" style="display: none;" class="mt-3 bg-light p-3 border rounded">
                    <h5>Dados de Administrador</h5>
                    <label for="nivel_permissao" class="form-label">Nível de Permissão (0 = Global, 1 = Institucional)</label>
                    <input type="number" min="0" max="1" class="form-control" id="nivel_permissao">
                </div>

                <div id="div_pedagogo" style="display: none;" class="mt-3 bg-light p-3 border rounded">
                    <h5>Dados de Pedagogo</h5>
                    <label for="cndb" class="form-label">CNDB</label>
                    <input type="text" class="form-control mb-2" id="cndb">
                    
                    <label for="instituicao" class="form-label">ID da Instituição</label>
                    <input type="number" class="form-control mb-2" id="instituicao">

                    <label for="especializacao" class="form-label">Especialização</label>
                    <input type="text" class="form-control" id="especializacao">
                </div>

                <div id="div_saude" style="display: none;" class="mt-3 bg-light p-3 border rounded">
                    <h5>Dados de Profissional da Saúde</h5>
                    <label for="crm" class="form-label">CRM</label>
                    <input type="text" class="form-control mb-2" id="crm">
                    
                    <label for="crp" class="form-label">CRP</label>
                    <input type="text" class="form-control" id="crp">
                </div>

                <div id="div_prof" style="display: none;" class="mt-3 bg-light p-3 border rounded">
                    <h5>Dados do Professor</h5>
                    <label for="materia" class="form-label">Matéria</label>
                    <input type="text" class="form-control" id="materia">
                    <!-- Professor usa ID e CNDB que compartilham os mesmos inputs criados acima no form HTML -->
                </div>

                <div id="div_responsavel" style="display: none;" class="mt-3 bg-light p-3 border rounded">
                    <h5>Dados do Responsável</h5>
                    <label for="data_nasc" class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" id="data_nasc">
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">Voltar</button>
                    <button type="button" class="btn btn-primary" id="enviar">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../src/components/valida_sessao.js"></script>
    <script src="../src/components/usuario_alterar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
