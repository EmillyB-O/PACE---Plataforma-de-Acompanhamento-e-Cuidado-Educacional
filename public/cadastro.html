<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../src/assets/css/style.css">
    <style>
        body {
            background-image: url(../src/assets/img/fundo3.png);
            background-size: cover;
        }
    </style>

    <title>PACE</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: #004e7a;" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PACE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Acompanhamento</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Turmas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Relatórios</a>
                    </li>

                    <div class="d-flex acessoNav">
                        <li class="nav-item">
                            <a href="login.html">
                                <button type="button" class="btn btn-outline-warning">Login</button>
                            </a>
                        </li>

                        <li class="nav-item active">
                            <a href="cadastro.html">
                                <button type="button" class="btn btn-outline-warning active">Cadastro</button>
                            </a>
                        </li>
                    </div>
                </ul>

            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 card p-4 shadow">
                <h3 class="text-center mb-4">Cadastro de Usuário</h5>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome">
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" maxlength="11" placeholder="Apenas números" inputmode="numeric">
                    </div>
                    <div class="col-md-6">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="telefone" maxlength="11" placeholder="Apenas números" inputmode="tel">
                    </div>
                    <div class="col-md-6">
                        <label for="cargo" class="form-label">Cargo (Tipo de Usuário)</label>
                        <select class="form-select" id="cargo">
                            <option value="">Selecione...</option>
                            <option value="3">Profissional da Saúde</option>
                            <option value="5">Responsável Legal</option>
                        </select>
                    </div>
                </div>

                <!-- Divs Especializadas -->
                <div id="div_saude" style="display: none;" class="mt-3 bg-light p-3 border rounded">
                    <h5>Dados de Profissional da Saúde</h5>
                    <label for="crm" class="form-label">CRM</label>
                    <input type="text" class="form-control mb-2" id="crm">
                    
                    <label for="crp" class="form-label">CRP</label>
                    <input type="text" class="form-control" id="crp">
                </div>

                <div id="div_responsavel" style="display: none;" class="mt-3 bg-light p-3 border rounded">
                    <h5>Dados do Responsável</h5>
                    <label for="data_nasc" class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" id="data_nasc">
                </div>

                <button type="button" class="btn btn-success w-100 mt-4" id="enviar">Cadastrar</button>
            </div>
        </div>
    </div>

    <script src="../src/components/usuario_cadastro.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
