<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../src/assets/css/style.css">
    <style>
        body {
            background-image: url(../src/assets/img/fundo3.png);
            background-size: cover;
        }
    </style>
    <title>Alterar Instituição - PACE</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: #004e7a;" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PACE</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">

                    <!--Comum a todos os usuários logados-->
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <!--Todos os administradores-->
                    <li class="nav-item">
                        <a class="nav-link" href="painel_admin.html">Usuários</a>
                    </li>

                    <!--Administradores e professores-->
                    <li class="nav-item">
                        <a class="nav-link" href="turma.html">Turmas</a>
                    </li>

                    <!--Administrador global-->
                    <li class="nav-item">
                        <a class="nav-link" href="instituicoes.html">Instituições</a>
                    </li>

                    <!--Profissionais da saúde e professores-->
                    <li class="nav-item">
                        <a class="nav-link" href="#">Alunos</a>
                    </li>
                </ul>

                <!--Comum a todos os usuários logados-->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button type="button" class="btn btn-outline-warning" onclick="logoff()">Sair</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card p-4 shadow">
                <h3 class="text-center mb-4">Alterar Aluno</h5>
                <input type="hidden" id="id">

                <div class="row mb-3">
                    <div class="col">
                        <label for="nome" class="form-label">Nome do aluno</label>
                        <input type="text" class="form-control" id="nome">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="serie" class="form-label">Série</label>
                        <input type="number" class="form-control" id="serie">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label for="nascimento" class="form-label">Data de nascimento</label>
                        <input type="date" class="form-control" id="nascimento">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">matricula</label>  
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="matriculado" id="radio-matriculado" value="matriculado">
                        <label class="form-check-label" for="radio-matriculado">Matriculado</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="transferido" id="transferido" value="transferido">
                        <label class="form-check-label" for="radio-transferido">Transferido</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="concluinte" id="concluinte" value="concluinte">
                        <label class="form-check-label" for="radio-concluinte">Concluinte</label>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="codigo_instituição" class="form-label">Id da instituicao</label>
                        <input type="number" class="form-control" id="codigo_instituição">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="codigo_turma" class="form-label">Id da turma</label>
                        <input type="number" class="form-control" id="codigo_turma">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../src/components/valida_sessao.js"></script>
    <script src="../src/components/instituicao/instituicao_alterar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
